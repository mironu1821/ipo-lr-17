<!DOCTYPE html>
<html>
<head>
    <title>Каталог товаров</title>
</head>
<body>
    <h1>Каталог товаров</h1>

    <form method="get" action="{% url 'catalog:product_list' %}">
        <input type="text" name="q" value="{{ query }}" placeholder="Поиск по названию...">
        <input type="text" name="category" placeholder="ID категории">
        <input type="text" name="manufacturer" placeholder="ID производителя">
        <button type="submit">Применить</button>
    </form>

    <hr>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        {% for product in products %}
            <div style="border: 1px solid #ccc; padding: 10px; width: 200px;">
                {% if product.photo %}
                    <img src="{{ product.photo.url }}" alt="{{ product.name }}" style="max-width: 100%;">
                {% endif %}
                <h3><a href="{% url 'catalog:product_detail' product.pk %}">{{ product.name }}</a></h3>
                <p>Цена: {{ product.price }} руб.</p>
                <p>В наличии: {{ product.stock }} шт.</p>
                <a href="{% url 'catalog:add_to_cart' product.id %}" style="background: green; color: white; padding: 5px; text-decoration: none;">Добавить в корзину</a>
            </div>
        {% empty %}
            <p>Товары не найдены.</p>
        {% endfor %}
    </div>
</body>
</html>
