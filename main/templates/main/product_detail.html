<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>
    <h1>{{ product.name }}</h1>
    {% if product.photo %}
        <img src="{{ product.photo.url }}" alt="{{ product.name }}" style="max-width: 300px;">
    {% endif %}
    <p><strong>Описание:</strong> {{ product.description }}</p>
    <p><strong>Цена:</strong> {{ product.price }} руб.</p>
    <p><strong>Остаток на складе:</strong> {{ product.stock }} шт.</p>
    <p><strong>Категория:</strong> {{ product.category.name }}</p>
    <p><strong>Производитель:</strong> {{ product.manufacturer.name }}</p>

    <a href="{% url 'catalog:add_to_cart' product.id %}" style="background: green; color: white; padding: 10px; text-decoration: none;">Добавить в корзину</a>
    <br><br>
    <a href="{% url 'catalog:product_list' %}">Назад в каталог</a>
</body>
</html>
